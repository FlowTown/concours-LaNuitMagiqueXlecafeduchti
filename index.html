<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeu Concours - La Nuit Magique</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
    padding:40px;
}

.container{
    max-width:500px;
    margin:auto;
}

input{
    width:100%;
    padding:12px;
    margin:15px 0;
    border:none;
    border-radius:8px;
}

button{
    background:#d4af37;
    color:black;
    border:none;
    padding:15px 25px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.small{
    font-size:12px;
    opacity:.8;
}
</style>
</head>

<body>

<div class="container">

<h1>🎩 Jeu Concours</h1>

<p>
Tentez votre chance pour gagner des places pour
La Nuit Magique.
</p>

<input type="email" id="email" placeholder="Votre adresse mail">

<button>Participer</button>

<p class="small">
Participation limitée à une seule participation
par adresse email.
</p>

</div>

</body>
</html>
